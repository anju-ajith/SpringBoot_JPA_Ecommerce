<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Login | BabyBloom</title>
<link rel="stylesheet" href="css/bootstrap.min.css">
<link rel="stylesheet" href="css/font-awesome.min.css">
<link rel="stylesheet" href="css/elegant-icons.css">
<link rel="stylesheet" href="css/style.css">

<style>
body {
	background: #f8f8f8;
	font-family: Arial;
}

.login-section {
	padding: 80px 0;
}

.login-card {
	width: 500px;
	background: white;
	padding: 40px;
	border-radius: 8px;
	box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

.login-title {
	font-size: 28px;
	font-weight: 600;
	margin-bottom: 25px;
}

.form-control {
	margin-bottom: 15px;
}

.site-btn {
	background: #ff6b6b;
	border: none;
	color: white;
	padding: 10px 25px;
	width: 100%;
}

.register-link {
	margin-top: 15px;
	text-align: center;
}
</style>

</head>

<body>


	<section class="login-section">
		<div class="container">
			<div class="row justify-content-center">

				<div class="col-lg-4">



					<div class="login-card">

						<div class="alert alert-success alert-dismissible fade show"
							th:if="${message}" role="alert">

							<span th:text="${message}"></span>

							<button type="button" class="close" data-dismiss="alert">
								&times;</button>
						</div>

						<div class="alert alert-danger alert-dismissible fade show"
							th:if="${error}" role="alert">

							<span th:text="${error}"></span>

							<button type="button" class="close" data-dismiss="alert">
								&times;</button>
						</div>

						<div class="alert alert-danger" th:if="${param.error}">
							Invalid email or password</div>


						<h3 class="login-title">Login/Register</h3>

						<form th:action="@{/login}" method="post">

							<input type="text" class="form-control"
								placeholder="Enter Your Email-Id*
								" name="username"
								required> <input type="password" class="form-control"
								placeholder="Password" name="password" required>
 <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
							<button type="submit" class="site-btn">Login</button>

						</form>
						<div class="register-link">
							<a href="#" data-toggle="modal"
								data-target="#forgotPasswordModal">Forgot Password?</a>
						</div>

						<div class="register-link">
							New to BabyBloom? <a href="/userRegistration">Register Here</a>
						</div>

					</div>
				</div>

			</div>
		</div>
	</section>




	<!-- forgot password modal -->

	<div class="modal fade" id="forgotPasswordModal" tabindex="-1">
		<div class="modal-dialog">
			<div class="modal-content">

				<div class="modal-header">
					<h5 class="modal-title h4 text-gray-900 mb-2">Forgot Your
						Password?</h5>
					<button type="button" class="close" data-dismiss="modal">&times;</button>
				</div>

				<form th:action="@{/resetUserPassword}" method="post">
					<div class="modal-body">


						<input type="email" name="email" class="form-control"
							placeholder="Enter Email Address.." required> 
							<input
							type="password" name="password" class="form-control"
							placeholder="Enter New Password" required>
							
							 <input type="hidden" th:name="${_csrf.parameterName}" 
               th:value="${_csrf.token}" />

					</div>

					<div class="modal-footer">
						<button type="submit" class="btn btn-primary">Reset</button>
					</div>
				</form>

			</div>
		</div>
	</div>

	<script src="js/jquery-3.3.1.min.js"></script>
	<script src="js/bootstrap.min.js"></script>

</body>
</html>
