<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<!-- Fonts & CSS -->
<link th:href="@{/assets/vendor/fontawesome-free/css/all.min.css}"
	rel="stylesheet">
<link th:href="@{/assets/css/sb-admin-2.min.css}" rel="stylesheet">


</head>

<body id="page-top">


	<div id="wrapper">

		<!-- SIDEBAR -->
		<ul
			class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion"
			id="accordionSidebar">

			<a
				class="sidebar-brand d-flex align-items-center justify-content-center"
				th:href="@{/admin}">
				<div class="sidebar-brand-icon rotate-n-15">
					<i class="fas fa-laugh-wink"></i>
				</div>
				<div class="sidebar-brand-text mx-3">Admin</div>
			</a>

			<hr class="sidebar-divider  my-0">

			<li class="nav-item active"><a class="nav-link"
				th:href="@{/admin}"> <i class="fas fa-fw fa-tachometer-alt"></i>
					<span>Dashboard</span>
			</a></li>

			<!-- Divider -->
			<hr class="sidebar-divider">

			<li class="nav-item"><a class="nav-link collapsed" href="#"
				data-toggle="collapse" data-target="#collapseTwo"
				aria-expanded="true" aria-controls="collapseTwo"> <i
					class="fas fa-fw fa-cog"></i> <span>Product</span>
			</a>
				<div id="collapseTwo" class="collapse" aria-labelledby="headingTwo"
					data-parent="#accordionSidebar">
					<div class="bg-white py-2 collapse-inner rounded">
						<!--   <h6 class="collapse-header">Custom Components:</h6> -->
						<a class="collapse-item" th:href="@{/addProduct}">Add Product</a>
						<a class="collapse-item" th:href="@{/getAllProductList}">Product
							List</a>
					</div>
				</div></li>

			<hr class="sidebar-divider">

			<li class="nav-item"><a class="nav-link collapsed" href="#"
				data-toggle="collapse" data-target="#collapseTwo_1"
				aria-expanded="true" aria-controls="collapseTwo_1"> <i
					class="fas fa-fw fa-cog"></i> <span>Order</span>
			</a>
				<div id="collapseTwo_1" class="collapse"
					aria-labelledby="headingTwo" data-parent="#accordionSidebar">
					<div class="bg-white py-2 collapse-inner rounded">
						<!--   <h6 class="collapse-header">Custom Components:</h6> -->
						<a class="collapse-item" th:href="@{/getOrderList}">Orders</a>

					</div>
				</div></li>
			<hr class="sidebar-divider">

			<li class="nav-item"><a class="nav-link collapsed" href="#"
				data-toggle="collapse" data-target="#collapseTwo_2"
				aria-expanded="true" aria-controls="collapseTwo_2"> <i
					class="fas fa-fw fa-cog"></i> <span>Customer</span>
			</a>
				<div id="collapseTwo_2" class="collapse"
					aria-labelledby="headingTwo" data-parent="#accordionSidebar">
					<div class="bg-white py-2 collapse-inner rounded">
						<!--   <h6 class="collapse-header">Custom Components:</h6> -->
						<a class="collapse-item" th:href="@{/getCustomerDetails}">Customer
							List</a>

					</div>
				</div></li>

			<!-- Divider -->
			<hr class="sidebar-divider d-none d-md-block">

			<!-- Sidebar Toggler (Sidebar) -->
			<div class="text-center d-none d-md-inline">
				<button class="rounded-circle border-0" id="sidebarToggle"></button>
			</div>


		</ul>




		<div id="content-wrapper" class="d-flex flex-column">

			<div id="content">

				<!-- TOPBAR -->
				<nav
					class="navbar navbar-expand navbar-light bg-white topbar mb-4 shadow">

					<button id="sidebarToggleTop"
						class="btn btn-link d-md-none rounded-circle">
						<i class="fa fa-bars"></i>
					</button>

					<ul class="navbar-nav ml-auto">

						<!-- Alerts -->
						<!-- <li class="nav-item dropdown no-arrow mx-1"><a
							class="nav-link dropdown-toggle" href="#" data-toggle="dropdown">
								<i class="fas fa-bell fa-fw"></i> <span
								class="badge badge-danger badge-counter">3+</span>
						</a></li> -->

						<div class="topbar-divider d-none d-sm-block"></div>

						<!-- Nav Item - User Information -->
						<li class="nav-item dropdown no-arrow"><a
							class="nav-link dropdown-toggle" href="#" id="userDropdown"
							role="button" data-toggle="dropdown" aria-haspopup="true"
							aria-expanded="false"> <span
								class="mr-2 d-none d-lg-inline text-gray-600 small"
								th:text="${#authentication.name}"></span> <img
								class="img-profile rounded-circle"
								th:src="@{/assets/img/undraw_profile.svg}">
						</a> <!-- Dropdown - User Information -->
							<div
								class="dropdown-menu dropdown-menu-right shadow animated--grow-in"
								aria-labelledby="userDropdown">
								<!-- <a class="dropdown-item" href="#"> <i
									class="fas fa-user fa-sm fa-fw mr-2 text-gray-400"></i> Profile
								</a> -->
								<!--     <a class="dropdown-item" href="#">
                                    <i class="fas fa-cogs fa-sm fa-fw mr-2 text-gray-400"></i>
                                    Settings
                                </a>
                                <a class="dropdown-item" href="#">
                                    <i class="fas fa-list fa-sm fa-fw mr-2 text-gray-400"></i>
                                    Activity Log
                                </a> -->
								<!-- <div class="dropdown-divider"></div> -->
								<a class="dropdown-item" href="#" data-toggle="modal"
									data-target="#logoutModal"> <i
									class="fas fa-sign-out-alt fa-sm fa-fw mr-2 text-gray-400"></i>
									Logout
								</a>
							</div></li>

					</ul>

				</nav>
				<!-- END TOPBAR -->


				<!-- CONTENT -->
				<div class="container-fluid">

					<h1 class="h3 mb-4 text-gray-800">Dashboard</h1>

					<div class="row">

						<!-- CARD -->
						<div class="col-xl-3 col-md-6 mb-4">
							<div class="card border-left-primary shadow h-100 py-2">
								<div class="card-body">
									<div class="text-xs font-weight-bold text-primary mb-1">
										Total Orders</div>
									<div class="h5 mb-0 font-weight-bold text-gray-800">
										<h3 th:text="${orderCount}">0</h3>
									</div>
								</div>
							</div>
						</div>

						<!-- CARD -->
						<div class="col-xl-3 col-md-6 mb-4">
							<div class="card border-left-success shadow h-100 py-2">
								<div class="card-body">
									<div class="text-xs font-weight-bold text-success mb-1">
										Products in Stock</div>
									<div class="h5 mb-0 font-weight-bold text-gray-800">
										<h3 th:text="${productCount}">0</h3>
									</div>
								</div>
							</div>
						</div>
						<!-- CARD -->
						<div class="col-xl-3 col-md-6 mb-4">
							<div class="card border-left-success shadow h-100 py-2">
								<div class="card-body">
									<div class="text-xs font-weight-bold text-success mb-1">
										Revenue</div>
									<div class="h5 mb-0 font-weight-bold text-gray-800">

										<div class="h5 mb-0 font-weight-bold text-gray-800">
											<h3>
												₹ <span th:text="${totalRevenue}">0</span>
											</h3>
										</div>

									</div>
								</div>
							</div>
						</div>
						<!-- CARD -->
						<div class="col-xl-3 col-md-6 mb-4">
							<div class="card border-left-primary shadow h-100 py-2">
								<div class="card-body">
									<div class="text-xs font-weight-bold text-primary mb-1">
										Customers</div>
									<div class="h5 mb-0 font-weight-bold text-gray-800">
										<h3 th:text="${userCount}">0</h3>
									</div>
								</div>
							</div>
						</div>

					</div>

					<!-- CHART -->
					<div class="row">
						<div class="col-xl-8 col-lg-7">
							<div class="card shadow mb-4">
								<div class="card-header">Earnings Overview</div>
								<div class="card-body">
									<canvas id="myAreaChart"></canvas>
								</div>
							</div>
						</div>
					</div>

				</div>
				<!-- END CONTENT -->

			</div>

			<!-- FOOTER -->
			<footer class="sticky-footer bg-white">
				<div class="container text-center">
					<span>© 2026 Admin Panel</span>
				</div>
			</footer>

		</div>

	</div>

	<!-- Scroll to Top Button-->
	<a class="scroll-to-top rounded" href="#page-top"> <i
		class="fas fa-angle-up"></i>
	</a>

	<!-- Logout Modal-->
	<div class="modal fade" id="logoutModal" tabindex="-1" role="dialog"
		aria-labelledby="exampleModalLabel" aria-hidden="true">
		<div class="modal-dialog" role="document">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title" id="exampleModalLabel">Ready to Leave?</h5>
					<button class="close" type="button" data-dismiss="modal"
						aria-label="Close">
						<span aria-hidden="true">×</span>
					</button>
				</div>
				<div class="modal-body">You’re about to log out of your
					account.</div>
				<div class="modal-footer">
					<button class="btn btn-secondary" type="button"
						data-dismiss="modal">Cancel</button>
					<form th:action="@{/adminLogout}" method="post">
						<button type="submit" class="btn btn-primary">Logout</button>
					</form>
				</div>
			</div>
		</div>
	</div>

	<script th:inline="javascript">
		var monthlyRevenue = /*[[${monthlyRevenue}]]*/[];
		console.log(monthlyRevenue);
	</script>



	<!-- JS FILES -->
	<script th:src="@{/assets/vendor/jquery/jquery.min.js}"></script>
	<script th:src="@{/assets/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
	<script th:src="@{/assets/vendor/jquery-easing/jquery.easing.min.js}"></script>

	<script th:src="@{/assets/js/sb-admin-2.min.js}"></script>

	<script th:src="@{/assets/vendor/chart.js/Chart.min.js}">
		
	</script>
	<script th:src="@{/assets/js/demo/chart-area-demo.js}"></script>
