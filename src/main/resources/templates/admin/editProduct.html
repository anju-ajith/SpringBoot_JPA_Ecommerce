					<!-- Page Heading -->
					<h1 class="h3 mb-4 text-gray-800">Add Product</h1>

					<div class="card shadow mb-4">
						<div class="card-header py-3">
							<h6 class="m-0 font-weight-bold text-primary">Product
								Details</h6>
						</div>

						<div class="card-body">
							<form th:action="@{/updateProduct}" method="post"
								th:object="${product}">
								<input type="hidden" th:field="*{product_id}">
								<div class="row">

									<!-- Product Name -->
									<div class="col-md-6 mb-3">
										<label>Product Name</label> <input type="text"
											name="product_name" class="form-control"
											th:field="*{product_name}" required>
									</div>

									<!-- Price -->
									<div class="col-md-6 mb-3">
										<label>Price</label> <input type="number" step="0.01"
											name="price" class="form-control" th:field="*{price}"
											required>
									</div>

									<!-- Category -->
									<div class="col-md-6 mb-3">
										<label>Category</label> <select name="category"
											class="form-control" th:field="*{category}">
											<option value="newborn">Newborn</option>
											<option value="girls">Girls</option>
											<option value="boys">Boys</option>
										</select>
									</div>

									<!-- Type -->
									<div class="col-md-6 mb-3">
										<label>Type</label> <select name="type" class="form-control"
											th:field="*{type}">
											<option value="Dresses">Dresses</option>
											<option value="PantsBottomWear">Pants&BottomWear</option>
											<option value="Tops/T-Shirts">Tops/T-Shirts</option>
											<option value="PantsLeggings">Pants&Leggings</option>
											<option value="T-Shirts">T-Shirts</option>
											<option value="SleepSuits">SleepSuits</option>
											<option value="BabySets">BabySets</option>
											<option value="Romper">Romper</option>
											<option value="Skirts">Skirts</option>

										</select>
									</div>

									<!-- Stock -->
									<div class="col-md-6 mb-3">
										<label>Stock</label> <input type="number" name="stock"
											class="form-control" th:field="*{stock}" required>
									</div>

									<!-- Size -->
									<div class="col-md-6 mb-3">
										<label>Size</label> <select name="size" class="form-control"
											th:field="*{size}">
											<option value="0-3months">Newborn</option>
											<option value="3-6months">3-6 Months</option>
											<option value="6-9months">6-9 Months</option>
											<option value="9-12months">9-12 Months</option>
											<option value="18-24months">18-24 Months</option>
											<option value="2-4years">2-4 Years</option>
											<option value="4-6years">4-6 Years</option>
											<option value="6-8years">6-8 Years</option>
											<option value="8-10years">8-10 Years</option>
										</select>
									</div>

									<!-- Color -->
									<div class="col-md-6 mb-3">
										<label>Color</label> <input type="text" name="color"
											class="form-control" placeholder="Red, Blue..."
											th:field="*{color}">
									</div>

									<!-- Image Upload -->

									<div class="col-md-6 mb-3">
										<label>Current Image</label><br><input type="hidden" th:field="*{imageurl}"> 
										<img th:src="${product.imageurl}" width="100" height="100" />

									</div>
									
									<div class="col-md-6 mb-3">
										<label>Change Image</label> <input type="file"
											name="imageFile" class="form-control">
									</div>

									<!-- Description -->
									<div class="col-md-12 mb-3">
										<label>Description</label>
										<textarea name="description" class="form-control" rows="3"
											th:field="*{description}"></textarea>
									</div>

								</div>

								<!-- Buttons -->
								<div class="text-right">
									<button type="submit" class="btn btn-success">
										<i class="fas fa-save"></i> Update Product
									</button>
								</div>

							</form>
						</div>
					</div>

				</div>
